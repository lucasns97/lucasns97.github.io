<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>IA Experimental - Pesquise</title>
    <!-- import CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <!-- bootstrap -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" rel="stylesheet"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <link rel="stylesheet" href="src/css/app.css">

    <style>
        /* evita mostrar o template cru antes do Vue montar */
        [v-cloak] { display: none; }
    </style>
</head>

<body>
    <div id="search" v-cloak>
        <el-row class="menu__outer">
            <el-menu
                :default-active="activeMenu"
                class="el-menu-demo"
                mode="horizontal"
                @select="handleMenu"
                background-color="#FFFFFF"
                text-color="#4E598C"
                active-text-color="#FF8C42">
                <el-menu-item index="1" class="menu-text" @click="navigateTo('index.html')">Home</el-menu-item>
                <el-menu-item index="2" class="menu-text" @click="navigateTo('search.html')">Pesquise</el-menu-item>
                <el-menu-item index="3" class="menu-text" @click="navigateTo('credits.html')">Agradecimentos</el-menu-item>
            </el-menu>
        </el-row>

        <!-- pesquisa -->
        <div>
            <el-row class="input-bar__outer" type="flex">
                <el-col class="input-bar__inner">
                    <el-input
                        placeholder="Pesquise um tópico" 
                        v-model="inputData" 
                        class="input-bar" 
                        size="medium"
                        @keyup.enter.native="filterByText()">
                    </el-input>
                </el-col>
            </el-row>
            <div class="container-fluid" id="button__outer">
                <div class="row" style="text-align: center">
                    <div class="col-xs-12 col-sm-6">
                        <el-button round @click="filterByText()">
                            <i class="material-icons btn-icon">search</i> Buscar
                            <div style="position: absolute; top: 28px" v-loading="loading"></div>
                        </el-button>
                    </div>
                    <div class="col-xs-12 col-sm-6">
                        <el-button round @click="getRandomTopic()">
                            <i class="material-icons btn-icon">device_unknown</i> Tópico aleatório
                        </el-button>
                    </div>
                </div>
            </div>
            <div v-if="Object.keys(filteredTopicsData).length === 0 && !loading">
                <div class="row" style="text-align: center; margin: 80px; opacity: 0.8; cursor: default">
                    <h3 style="font-size: 35px">Oops!<i class="material-icons" style="font-size: 35px; vertical-align: middle">mood_bad</i></h3>
                    <h3>Nenhum tópico encontrado</h3>
                </div>
            </div>
            <div class="container-fluid" id="card__outer">
                <div class="row" v-if="loading">
                    <div v-for="i in [1, 2, 3, 4, 5, 6]" class="col-xs-12 col-sm-12 col-lg-6 col-xl-6">
                        <el-card shadow="never" id="loading">
                            <div>
                                <h3 style="margin-top: 5px; background-color: #4E598C; color: #4E598C; opacity: 0.333; width: 60%; border-radius: 5px">.</h3>
                                <el-row type="flex">
                                    <h3 v-for="i in [1, 2, 3]" style="margin: 0; margin-right: 10px; margin-bottom: 7px; line-height: 17px; background-color: #4E598C; color: #4E598C; opacity: 0.333; width: 15%; border-radius: 10px">.</h3>
                                </el-row>
                                <p style="background-color: #4E598C; color: #4E598C; opacity: 0.20; width: 10%; border-radius: 5px; margin: 0; padding: 0">.</p>
                            </div>
                        </el-card>
                    </div>	   
                </div>
                <div class="row" v-else>
                    <div v-for="topic in filteredTopicsData" class="col-xs-12 col-sm-12 col-lg-6 col-xl-6">
                        <el-tooltip :content="topic.title" :visible-arrow="false" placement="top-start">
                            <el-card shadow="hover" @click.native="navigateTo(topic.path)">
                                <h3 style="font-size: 20px; margin-top: 5px">{{ topic.title }}</h3>
                                <el-row type="flex">
                                    <el-badge id="tag" v-for="tag in topic.tags" :value="tag" class="item"></el-badge>
                                </el-row>
                                <el-row type="flex">
                                    <p class="topic-time"><i class="material-icons">schedule</i> {{ topic.read_time.time_text }}</p>
                                </el-row>
                            </el-card>
                        </el-tooltip>
                    </div>	   
                </div>
                
            </div>
        </div>
    </div>

    <!-- import vue (fixado na v2, compatível com Element UI) -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.min.js"></script>
    <!-- import element ui -->
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <!-- import axios -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>

    <!-- instância Vue (substitui o src/js/search.js) -->
    <script>
        // ====================================================================
        // LISTA DE TÓPICOS
        // Edite aqui os tópicos do site. Cada tópico tem:
        //   title     -> título exibido no card
        //   tags      -> lista de etiquetas
        //   path      -> página aberta ao clicar no card
        //   read_time -> { time_text: 'X min' }
        //
        // Se existir um arquivo src/assets/topics.json no repositório com o
        // mesmo formato, ele será carregado automaticamente e substituirá
        // esta lista.
        // ====================================================================
        var TOPICS = [
            {
                title: 'O que é aprendizado de máquina?',
                tags: ['introdução', 'conceitos'],
                path: 'topics/aprendizado-de-maquina.html',
                read_time: { time_text: '10 min' }
            },
            {
                title: 'Datasets e suas opacidades',
                tags: ['dados', 'crítica'],
                path: 'topics/datasets.html',
                read_time: { time_text: '15 min' }
            },
            {
                title: 'IA e o Norte Global',
                tags: ['sociedade', 'crítica'],
                path: 'topics/norte-global.html',
                read_time: { time_text: '12 min' }
            }
        ];

        // remove acentos e normaliza para busca
        function normalize(text) {
            return String(text)
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }

        new Vue({
            el: '#search',
            data: {
                activeMenu: '2',
                inputData: '',
                loading: true,
                topicsData: [],
                filteredTopicsData: []
            },
            mounted: function () {
                var self = this;
                // tenta carregar topics.json; se não existir, usa a lista TOPICS acima
                axios.get('src/assets/topics.json')
                    .then(function (response) {
                        self.topicsData = Array.isArray(response.data) ? response.data : TOPICS;
                    })
                    .catch(function () {
                        self.topicsData = TOPICS;
                    })
                    .finally(function () {
                        self.filteredTopicsData = self.topicsData;
                        self.loading = false;
                    });
            },
            methods: {
                filterByText: function () {
                    var self = this;
                    this.loading = true;

                    var query = normalize(this.inputData.trim());

                    // pequeno delay só para o skeleton de loading aparecer
                    setTimeout(function () {
                        if (query === '') {
                            self.filteredTopicsData = self.topicsData;
                        } else {
                            self.filteredTopicsData = self.topicsData.filter(function (topic) {
                                var inTitle = normalize(topic.title).indexOf(query) !== -1;
                                var inTags = (topic.tags || []).some(function (tag) {
                                    return normalize(tag).indexOf(query) !== -1;
                                });
                                return inTitle || inTags;
                            });
                        }
                        self.loading = false;
                    }, 300);
                },
                getRandomTopic: function () {
                    if (this.topicsData.length === 0) return;
                    var randomIndex = Math.floor(Math.random() * this.topicsData.length);
                    this.inputData = '';
                    this.filteredTopicsData = [this.topicsData[randomIndex]];
                },
                navigateTo: function (page) {
                    window.location.href = page;
                },
                handleMenu: function (index) {
                    this.activeMenu = index;
                }
            }
        });
    </script>

</body>
</html>
